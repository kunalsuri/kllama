  <text x="86" y="144" fill="#D9E7DE" font-family="Arial, Helvetica, sans-serif" font-size="18">Local-first GenAI for learning</text>

  <rect x="82" y="188" width="242" height="58" rx="16" fill="#F7C66C"/>
