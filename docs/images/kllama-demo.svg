  <rect x="380" y="56" width="844" height="84" rx="22" fill="#F0E3CF"/>
  <text x="412" y="106" fill="#182018" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Kllama classroom preview</text>

  <rect x="410" y="176" width="772" height="108" rx="24" fill="#E5F1EB" stroke="#2F6A53" stroke-width="2"/>
  <text x="442" y="220" fill="#1D3327" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Student</text>
  <text x="442" y="252" fill="#1D3327" font-family="Arial, Helvetica, sans-serif" font-size="24">Explain why local LLM workflows matter in education.</text>

  <rect x="410" y="314" width="772" height="180" rx="24" fill="#FFF3D9" stroke="#D39A37" stroke-width="2"/>
  <text x="442" y="358" fill="#4B3315" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Kllama</text>
  <text x="442" y="392" fill="#4B3315" font-family="Arial, Helvetica, sans-serif" font-size="24">Local models help students learn with more privacy, lower cost, and</text>
  <text x="442" y="426" fill="#4B3315" font-family="Arial, Helvetica, sans-serif" font-size="24">clearer visibility into prompting, model choice, and response quality.</text>
  <text x="442" y="460" fill="#4B3315" font-family="Arial, Helvetica, sans-serif" font-size="24">That makes Kllama a good teaching surface for practical GenAI.</text>

  <rect x="410" y="528" width="772" height="84" rx="24" fill="#F7F4EE" stroke="#A29787" stroke-width="2"/>
  <text x="442" y="578" fill="#4B4B4B" font-family="Arial, Helvetica, sans-serif" font-size="24">Ask Kllama something...</text>

